<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth in three.js</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #c {
        width: 100%;
        height: 100%;
        display: block;
      }
      #loading {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: sans-serif;
        gap: 12px;
        transition: opacity 0.5s;
      }

      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #progress-bar-container {
        width: 200px;
        height: 4px;
        background: #333;
        border-radius: 2px;
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: #4af;
        border-radius: 2px;
        transition: width 0.1s;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script type="module" src="earth.js"></script>
    <!-- <script type="module" src="/main.js"></script> -->
    <!-- <script type="module" src="/drawing-lines.js"></script> -->
    <!-- <script type="module" src="/three-cubes.js"></script> -->
  </body>
</html>
